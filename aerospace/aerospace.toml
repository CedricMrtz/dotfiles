config-version = 2

# ── Startup ───────────────────────────────────────────────────────────────────
after-startup-command = []
start-at-login = true

# ── Normalization ─────────────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ── Layouts ───────────────────────────────────────────────────────────────────
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ── Behavior ──────────────────────────────────────────────────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true  # prevents cmd-h accidents

# Only keep the workspaces you'll actually use
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

[key-mapping]
    preset = 'qwerty'
# ── Gaps ──────────────────────────────────────────────────────────────────────
[gaps]
    inner.horizontal = 8
    inner.vertical   = 8
    outer.left       = 8
    outer.bottom     = 8
    outer.top        = 8
    outer.right      = 8

# ── Main bindings ─────────────────────────────────────────────────────────────
[mode.main.binding]

    alt-a = 'focus left'
    alt-s = 'focus down'
    alt-w = 'focus up'
    alt-d = 'focus right'

    alt-shift-a = 'move left'
    alt-shift-s = 'move down'
    alt-shift-w = 'move up'
    alt-shift-d = 'move right'

    # --- Layouts ---
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-f     = 'layout floating tiling'   # quick float toggle without entering service mode

    # --- Resize ---
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # --- Fullscreen ---
    alt-shift-f = 'fullscreen'

    # --- Open terminal (alt+enter, i3-style) ---
    alt-enter = 'exec-and-forget open -a Ghostty'
    
    # --- Workspaces (only 1-9 — trim what you don't need) ---
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # --- Move window to workspace ---
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    # --- Monitor navigation ---
    alt-tab       = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    alt-shift-m   = 'move-node-to-monitor --wrap-around next'  # send window to next monitor

    # --- Modes ---
    alt-shift-semicolon = 'mode service'
    alt-shift-r         = 'mode resize'   # ✨ dedicated resize mode

# ── Service mode ──────────────────────────────────────────────────────────────
[mode.service.binding]
    esc       = ['reload-config', 'mode main']
    r         = ['flatten-workspace-tree', 'mode main']
    f         = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-a = ['join-with left',  'mode main']
    alt-shift-s = ['join-with down',  'mode main']
    alt-shift-w = ['join-with up',    'mode main']
    alt-shift-d = ['join-with right', 'mode main']

# ── Resize mode ───────────────────────────────────────────────────────────────
[mode.resize.binding]
    a   = 'resize width -50'
    d   = 'resize width +50'
    s   = 'resize height -50'
    w   = 'resize height +50'
    esc = 'mode main'
